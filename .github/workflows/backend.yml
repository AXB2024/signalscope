name: Deploy Backend

on:
  push:
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint (optional)
        run: echo "Add linting here"